# Duplicate Issue Detection — TF-IDF similarity (see .github/scripts/identify_duplicates.py).
# Triggers: opened + edited. Rationale: docs/development/adr-001-duplicate-issue-detection-triggers.md
# — edited allows E2E validation without new throwaway issues; re-checks when title/body change.
name: Duplicate Issue Detection
on:
  issues:
    types: [opened, edited]

jobs:
  detect-duplicates:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # This composite action sets PYTHONPATH to include the workspace directory
      # See .github/actions/set-pythonpath/action.yml for details
      - name: Set PYTHONPATH
        uses: ./.github/actions/set-pythonpath

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub scikit-learn

      - name: Analyze Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u .github/scripts/identify_duplicates.py
