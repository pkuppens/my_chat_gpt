# .github/workflows/issue-analyzer.yml
name: Issue Analyzer
on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to analyze (required for manual runs)
        required: true
        type: string
      use_mock:
        description: Canned LLM output (no OPENAI_API_KEY); exercises GitHub comment and labels only
        type: boolean
        default: false

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    # Allow workflow to write comments and manage labels
    permissions:
      issues: write
      contents: read

    steps:
      # Checkout the repository to access documentation and prompts
      - uses: actions/checkout@v6

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # This composite action sets PYTHONPATH to include the workspace directory
      # See .github/actions/set-pythonpath/action.yml for details
      - name: Set PYTHONPATH
        uses: ./.github/actions/set-pythonpath

      # Install minimal workflow dependencies, then the package without resolving the full
      # pyproject.toml tree (avoids torch/gradio-scale installs on every issue event).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.github.workflow
          pip install --no-deps -e .

      # Test dependencies to ensure everything is installed correctly
      - name: Test dependencies
        run: python .github/scripts/test_dependencies.py

      # Manual runs: gh workflow run issue-analyzer.yml -f issue_number=26
      # Issue opened/edited: event payload supplies the issue; no --issue flag.
      # Run the issue analyzer with enhanced prompt context
      # Note: The workflow now uses the enhanced system prompt that includes
      # best practices from docs/development/ISSUE_BEST_PRACTICES.md
      #
      # Configuration Notes:
      # - LLM_PROVIDER: Currently supports 'openai' (can be extended)
      # - LLM_MODEL: OpenAI model to use (gpt-4o-mini for cost-effective, gpt-4 for complex)
      # - OPENAI_API_KEY: Must be set in repository secrets
      # - GITHUB_TOKEN: Automatically provided by GitHub Actions
      #
      # To configure:
      # 1. Go to repository Settings > Secrets and variables > Actions
      # 2. Add OPENAI_API_KEY with your OpenAI API key (not required if use_mock on manual dispatch)
      # 3. See docs/development/WORKFLOW_CONFIGURATION.md for ISSUE_ANALYZER_MOCK_LLM
      - name: Run issue analyzer
        if: github.event_name == 'issues'
        env:
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o-mini
          MAX_TOKENS: 4096
          TEMPERATURE: 0.1
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python -u .github/scripts/analyze_issue.py

      - name: Run issue analyzer (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o-mini
          MAX_TOKENS: 4096
          TEMPERATURE: 0.1
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
          ISSUE_ANALYZER_MOCK_LLM: ${{ github.event.inputs.use_mock == 'true' && '1' || '' }}
        run: python -u .github/scripts/analyze_issue.py --issue ${{ github.event.inputs.issue_number }}
